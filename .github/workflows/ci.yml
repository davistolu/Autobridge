name: CI

on:
  pull_request:
    branches:
      - preview
  push:
    branches:
      - preview

jobs:
  core:
    name: Core (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd core && npm install

      - name: Type check
        run: cd core && npx tsc --noEmit

  dashboard:
    name: Dashboard (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd dashboard && npm install

      - name: Build
        run: cd dashboard && npx vite build

