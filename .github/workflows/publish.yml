name: Publish SDKs

# Fires after promote.yml creates a version tag on main.
# Publishes all SDKs to their respective package registries simultaneously.
#
# Required secrets (Settings → Secrets → Actions):
#   NPM_TOKEN       — npmjs.com access token
#   PYPI_TOKEN      — PyPI API token
#   RUBYGEMS_TOKEN  — RubyGems API key
#
# Packagist (PHP/Laravel) and Go modules update automatically from the
# new tag — no secrets or push steps needed for those.

on:
  push:
    tags:
      - "v*"           # Only runs when a version tag is pushed to any branch
    branches:
      - main           # Extra guard — only act on tags that land on main

jobs:
  # ─── npm — TypeScript/JS SDK ──────────────────────────────────────────────
  publish-npm:
    name: Publish → npm (@wirebridge/sdk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Install and build
        run: cd sdk-ts && npm ci && npm run build

      - name: Publish
        run: cd sdk-ts && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── PyPI — Python SDK ────────────────────────────────────────────────────
  publish-pypi:
    name: Publish → PyPI (wirebridge-sdk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build
        run: cd sdk-python && python -m build

      - name: Publish
        run: twine upload sdk-python/dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # ─── RubyGems — Ruby SDK ─────────────────────────────────────────────────
  publish-gem:
    name: Publish → RubyGems (wirebridge-sdk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Build gem
        run: cd sdk-ruby && gem build wirebridge-sdk.gemspec

      - name: Publish
        run: cd sdk-ruby && gem push *.gem
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_TOKEN }}

  # ─── Packagist — Laravel SDK ─────────────────────────────────────────────
  # Packagist auto-syncs when a new tag is pushed to github.com/wirebridge/sdk-laravel
  # No action needed here — just document it.
  packagist-note:
    name: Packagist (auto-sync)
    runs-on: ubuntu-latest
    steps:
      - name: Note
        run: |
          echo "Packagist syncs automatically from the new tag."
          echo "Verify at: https://packagist.org/packages/wirebridge/sdk-laravel"

  # ─── Go modules — Go SDK ─────────────────────────────────────────────────
  # Go modules are resolved directly from GitHub tags — no registry push needed.
  go-note:
    name: Go modules (tag-based)
    runs-on: ubuntu-latest
    steps:
      - name: Note
        run: |
          echo "Go modules resolve from the GitHub tag automatically."
          echo "go get github.com/wirebridge/sdk-go@${{ github.ref_name }} will work."
