name: Promote preview → main

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.2.0)"
        required: true
      release_notes:
        description: "Release notes (optional)"
        required: false

jobs:
  promote:
    name: Merge into main + tag release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge preview into main
        run: |
          git fetch origin preview
          git merge origin/preview --no-ff -m "chore: promote preview → main (${{ inputs.version }})"
          git push origin main

      - name: Tag the release
        run: |
          git tag ${{ inputs.version }} -m "Release ${{ inputs.version }}"
          git push origin ${{ inputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: "${{ inputs.version }}"
          body: ${{ inputs.release_notes || 'See commit history for changes in this release.' }}
          target_commitish: main
